<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FakeStore Amaliy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  </head>
  <style>
      body {
        background: #f8f9fa;
      }
      .card {
        cursor: pointer;
        transition: 0.3s;
      }
      .card:hover {
        transform: scale(1.03);
      }
</style>
  <body>
    <div class="container py-4">
      <h1 class="text-center mb-4">FakeStore</h1>
      <div class="card p-3 mb-4 shadow-sm">
        <h5>Add Product</h5>
        <div class="row g-2">
          <div class="col-md-4">
            <input id="title" class="form-control" placeholder="Title" />
          </div>
          <div class="col-md-3">
            <input id="price" class="form-control" placeholder="Price" />
          </div>
          <div class="col-md-3">
            <input id="image" class="form-control" placeholder="Image URL" />
          </div>
          <div class="col-md-2">
            <button class="btn btn-success w-100" onclick="addProduct()">
              Add
            </button>
          </div>
        </div>
      </div>
      <button class="btn btn-primary mb-3" onclick="getProducts()">
        Load Products
      </button>
      <div id="products" class="row"></div>
    </div>
    <div class="modal fade" id="infoModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Product Info</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <img id="infoImage" class="img-fluid mb-3" />
            <h5 id="infoTitle"></h5>
            <p id="infoPrice"></p>
            <p id="infoCategory"></p>
            <p id="infoDesc"></p>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Product</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input
              id="editTitle"
              class="form-control mb-2"
              placeholder="Title"
            />
            <input
              id="editPrice"
              class="form-control mb-2"
              placeholder="Price"
            />
            <input
              id="editImage"
              class="form-control mb-2"
              placeholder="Image"
            />
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
            <button class="btn btn-primary" onclick="saveUpdate()">Save</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
  </body>
</html>
